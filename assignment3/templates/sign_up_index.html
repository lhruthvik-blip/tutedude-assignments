<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f3f4f6;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      max-width: 420px;
      width: 100%;
      padding: 32px;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 28px;
      color: #111827;
    }

    p {
      margin: 0 0 24px;
      color: #6b7280;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #374151;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      box-sizing: border-box;
    }

    .form-group input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .submit-button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      background-color: #2563eb;
      color: #ffffff;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    .submit-button:hover {
      background-color: #1d4ed8;
    }

    .small-text {
      margin-top: 16px;
      font-size: 13px;
      color: #6b7280;
      text-align: center;
    }

    .small-text a {
      color: #2563eb;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Create your account</h1>
    <p>Sign up to access your dashboard and manage your profile.</p>

    <form action="/signup" method="post" id="signup-form">
      <div class="form-group">
        <label for="full-name">Full Name</label>
        <input type="text" id="full-name" name="full_name" placeholder="Jane Doe" required>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="jane@example.com" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Create a password" required>
      </div>

      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" name="confirm_password" placeholder="Repeat your password" required>
      </div>

      <button type="submit" class="submit-button">Sign Up</button>
    </form>

    <div id="error-message" style="color: red; margin-top: 10px; text-align: center;"></div>

    <p class="small-text">Already have an account? <a href="/login">Log in</a></p>
  </div>

  <script>
    document.getElementById('signup-form').addEventListener('submit', function(e) {
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      
      if (password !== confirmPassword) {
        e.preventDefault();
        document.getElementById('error-message').textContent = 'Passwords do not match.';
      } else {
        document.getElementById('error-message').textContent = '';
      }
    });
  </script>
</body>
</html>
